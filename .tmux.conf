# Set prefix to Ctrl+b (default)
unbind C-b
set -g prefix C-b
bind C-b send-prefix

# Refresh with r 
unbind r
bind r source-file ~/.tmux.conf

# Vim-style pane navigation
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Easy pane splitting
bind | split-window -h
bind - split-window -v

# Enable mouse support
set -g mouse on
bind -T copy-mode WheelUpPane send-keys -X -N 5 scroll-up
bind -T copy-mode WheelDownPane send-keys -X -N 5 scroll-down
bind -T copy-mode-vi WheelUpPane send-keys -X -N 5 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 5 scroll-down

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# make copying and pasting in tmux so much easier
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"

# Better pane borders
set -g pane-border-style fg=black
set -g pane-active-border-style fg=blue

# Resize panes with Ctrl+Alt + h/j/k/l
bind -n C-M-h resize-pane -L 5
bind -n C-M-j resize-pane -D 5
bind -n C-M-k resize-pane -U 5
bind -n C-M-l resize-pane -R 5

# Navigate tabs with n and p 
bind -n C-p previous-window
bind -n C-n next-window

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dracula/tmux'

# dracula/tmux config
set -g @dracula-show-powerline true
set -g @dracula-fixed-location "Chicago"
set -g @dracula-plugins "weather"
set -g @dracula-show-flags true
set -g @dracula-show-left-icon session
set -g status-position top

# load in tmux plugin
run '~/.tmux/plugins/tpm/tpm'
